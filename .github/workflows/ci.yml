name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Install & cache ────────────────────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('package.json', 'client/package.json', 'server/package.json') }}

      - name: Install root dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Install client dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm --prefix client install --include=dev

      - name: Install server dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm --prefix server install --include=dev

  # ─── Lint (client + server via root script) ────────────────────────────────
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('package.json', 'client/package.json', 'server/package.json') }}

      - name: Lint client
        run: npm --prefix client run lint

      - name: Lint server
        run: npm --prefix server run lint

  # ─── Type check (client + server via root script) ──────────────────────────
  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('package.json', 'client/package.json', 'server/package.json') }}

      - name: Type check client
        run: npm --prefix client run typecheck

      - name: Type check server
        run: npm --prefix server run typecheck

  # ─── Tests ─────────────────────────────────────────────────────────────────
  test-client:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('package.json', 'client/package.json', 'server/package.json') }}

      - name: Run client tests
        run: npm --prefix client test -- --run

  test-server:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('package.json', 'client/package.json', 'server/package.json') }}

      - name: Run server tests
        run: npm --prefix server test

  # ─── Build (mirrors Render build commands) ─────────────────────────────────
  build:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('package.json', 'client/package.json', 'server/package.json') }}

      - name: Build client
        run: npm --prefix client run build
        env:
          VITE_API_URL: https://api.aivis.biz

      - name: Build server
        run: |
          node server/tools/stageClientDist.mjs
          npx --prefix server tsc -p server/tsconfig.build.json || true

  # ─── Security audit ────────────────────────────────────────────────────────
  security:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ hashFiles('package.json', 'client/package.json', 'server/package.json') }}

      - name: Audit root
        run: npm audit --audit-level=moderate || true

      - name: Audit client
        run: npm --prefix client audit --audit-level=moderate || true

      - name: Audit server
        run: npm --prefix server audit --audit-level=moderate || true

  # ─── Deploy to Render (main branch only) ───────────────────────────────────
  deploy:
    needs: [build, test-client, test-server, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy - API
        run: curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Render deploy - Web
        run: curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"
