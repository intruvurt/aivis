        <h1 style="font-size:28px;margin:0 0 12px">AI Visibility Intelligence Platform</h1>
        <p style="color:#94a3b8;line-height:1.6">
          AiVIS is an AI visibility intelligence platform that audits how answer engines read, trust and cite a website.
          It interprets your site's structure, trust signals and citation readiness based on real page evidence, not inferred summaries.
          Get a 0-100 visibility score with evidence-backed findings and prioritized fixes.
        </p>

        <h2 style="font-size:22px;margin:28px 0 10px">What is AI visibility</h2>
        <p style="color:#94a3b8;line-height:1.6">
          AI visibility is the degree to which a website can be understood, trusted and reused by systems that generate answers instead of returning links.
          It depends on content depth, heading clarity, schema coverage, metadata quality and machine readable formatting.
          A page can rank first in traditional search and still be invisible to answer engines if these signals are missing.
          Ranking alone does not earn citation. AiVIS measures the extractability, trust signal alignment and citation readiness of your content by analyzing what answer engines actually need to formulate a reliable answer.
          Learn more about the <a href="/methodology" style="color:#06b6d4">audit methodology</a> behind the scoring.
        </p>

        <h2 style="font-size:22px;margin:28px 0 10px">Evidence-backed visibility intelligence</h2>
        <h3 style="font-size:18px;margin:16px 0 8px">Full page interpretation</h3>
        <p style="color:#94a3b8;line-height:1.6">AiVIS reads your page the way an answer engine does and shows where meaning breaks or becomes unclear.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Evidence IDs linked findings</h3>
        <p style="color:#94a3b8;line-height:1.6">Every issue is tied to a real part of your page so you can see what caused it and how to fix it.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Clear consistent scoring logic</h3>
        <p style="color:#94a3b8;line-height:1.6">You get a visibility score based on structure, content and trust signals that affect citation readiness. No AI guessing, hallucinations or opinions. Every finding must be validated with BRAG evidence IDs.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Actionable fixes</h3>
        <p style="color:#94a3b8;line-height:1.6">Each result includes direct changes that improve how your site is read and reused by AI systems.</p>

        <h2 style="font-size:22px;margin:28px 0 10px">How AI systems evaluate websites</h2>
        <h3 style="font-size:18px;margin:16px 0 8px">Structure comes first</h3>
        <p style="color:#94a3b8;line-height:1.6">Clean headings and logical sections help models understand what each part of the page means without guessing.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Clarity beats volume</h3>
        <p style="color:#94a3b8;line-height:1.6">A long page does not help if the meaning is unclear. AI prefers content that is easy to break into usable parts.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Trust is earned through signals</h3>
        <p style="color:#94a3b8;line-height:1.6">Consistent naming, schema and supporting details increase confidence in what the page is saying. Use the free <a href="/tools/schema-validator" style="color:#06b6d4">structured data impact validator</a> to check your schema coverage.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Alignment with real user questions</h3>
        <p style="color:#94a3b8;line-height:1.6">Content must match how users actually ask questions or it will not be retrieved.</p>

        <h2 style="font-size:22px;margin:28px 0 10px">What AiVIS actually audits</h2>
        <h3 style="font-size:18px;margin:16px 0 8px">Content depth</h3>
        <p style="color:#94a3b8;line-height:1.6">Whether your page has enough substance to support extraction, summarization and reuse.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Heading hierarchy</h3>
        <p style="color:#94a3b8;line-height:1.6">Whether your structure helps or blocks understanding across sections.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Entity clarity and authority</h3>
        <p style="color:#94a3b8;line-height:1.6">Whether your site clearly defines what it is and how it should be trusted and understood by machines.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Structured data</h3>
        <p style="color:#94a3b8;line-height:1.6">Whether your schema supports your content or conflicts with it.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Technical foundation</h3>
        <p style="color:#94a3b8;line-height:1.6">Whether performance, crawlability, robots, SPA and accessibility are blocking interpretation.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Citation readiness</h3>
        <p style="color:#94a3b8;line-height:1.6">Whether your content can be safely used inside AI generated answers.</p>

        <h2 style="font-size:22px;margin:28px 0 10px">Who benefits from AI visibility audits</h2>
        <p style="color:#94a3b8;line-height:1.6">
          AI visibility audits help anyone whose content needs to appear inside generated answers.
          If your site depends on being found, trusted and reused by AI systems, this audit shows you exactly where visibility breaks and how to fix it.
        </p>
        <h3 style="font-size:18px;margin:16px 0 8px">Founders and product teams</h3>
        <p style="color:#94a3b8;line-height:1.6">Understand whether your product pages, documentation and landing pages are readable by AI systems that potential customers use to evaluate solutions before they ever visit your site.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Marketing and content teams</h3>
        <p style="color:#94a3b8;line-height:1.6">See which content assets are eligible for citation, which are being ignored, and what structural changes unlock retrieval across ChatGPT, Perplexity, Claude and Google Gemini.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Developers and technical leads</h3>
        <p style="color:#94a3b8;line-height:1.6">Audit schema markup, heading hierarchy, canonical tags and structured data against the signals AI models use to build trust, resolve entities and extract usable content.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Power users and consultants</h3>
        <p style="color:#94a3b8;line-height:1.6">Offer clients measurable proof of AI visibility health with a structured report that connects every finding to actual site evidence through BRAG evidence integrity identifiers.</p>

        <h2 style="font-size:22px;margin:28px 0 10px">Based Retrieval and Auditable Grading</h2>
        <p style="color:#94a3b8;line-height:1.6">
          AiVIS uses BRAG which stands for Based Retrieval and Auditable Grading. Every finding is tied to verifiable page evidence using stable evidence identifiers.
          Each element of your page is assigned a BRAG evidence ID so results can be traced, verified and rechecked across scan cycles.
          If something cannot be proven it is not included. If something is missing it is shown as missing. <a href="https://github.com/dobleduche/brag" style="color:#06b6d4">Learn more about BRAG, or customize it for your needs.</a>
        </p>

        <h2 style="font-size:22px;margin:28px 0 10px">From audit to citation</h2>
        <p style="color:#94a3b8;line-height:1.6">
          An audit is the starting point. AiVIS also supports <a href="/citations" style="color:#06b6d4">how AI citation testing works</a> to verify whether AI models reference your brand in live answers.
          You can run <a href="/competitors" style="color:#06b6d4">competitor visibility tracking</a> to benchmark your visibility against rival sites.
          Review the <a href="/methodology" style="color:#06b6d4">audit methodology</a> to understand how each category is scored or use the <a href="/tools/schema-validator" style="color:#06b6d4">structured data impact validator</a> to check your schema coverage.
        </p>

        <h2 style="font-size:22px;margin:28px 0 10px">Frequently asked questions about AI search visibility</h2>
        <h3 style="font-size:18px;margin:16px 0 8px">What is AiVIS</h3>
        <p style="color:#94a3b8;line-height:1.6">AiVIS is an AI visibility intelligence platform that audits how answer engines read, trust and cite a website. It crawls your page, extracts structural signals and maps them to a 0-100 visibility score across six weighted categories. Every finding is tied to real page evidence through BRAG evidence identifiers so results can be verified and traced, not assumed.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">What is AI visibility</h3>
        <p style="color:#94a3b8;line-height:1.6">AI visibility is the degree to which a website can be understood, trusted and reused by systems that generate answers instead of returning links. It depends on content depth, heading clarity, schema coverage, metadata quality and machine-readable formatting. A page can rank first in traditional search and still be invisible to answer engines if these signals are missing.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">What causes low AI visibility scores</h3>
        <p style="color:#94a3b8;line-height:1.6">Common causes include thin content with fewer than 800 words, missing or conflicting structured data, unclear heading hierarchy, absent metadata, weak entity signals and poor technical foundations like blocked crawlers or slow load times. AiVIS identifies each gap with evidence so you know exactly what to fix and in what order of impact.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">How does AiVIS find visibility issues</h3>
        <p style="color:#94a3b8;line-height:1.6">AiVIS crawls the target URL with a real browser, extracts structural signals including headings, schema, meta tags, body content and links, then runs them through a multi-model AI pipeline that scores each category. On higher tiers a second model critiques findings and a third validates the result. Every issue references specific page evidence through BRAG identifiers.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">What is citation readiness</h3>
        <p style="color:#94a3b8;line-height:1.6">Citation readiness measures how safe and reliable a page is for reuse inside AI-generated answers. It requires clear entity definitions, consistent schema support, sufficient content depth and structural formatting that allows AI systems to extract usable information without risking attribution errors or factual misrepresentation.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">What is BRAG in AiVIS</h3>
        <p style="color:#94a3b8;line-height:1.6">BRAG stands for Based Retrieval and Auditable Grading. It is the evidence framework that ties every audit finding to a real element on your page. Each heading, schema block, meta tag and content section receives a BRAG evidence identifier that can be traced, verified and rechecked across scan cycles so no finding is left unsupported.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Why does structure matter for AI systems</h3>
        <p style="color:#94a3b8;line-height:1.6">Structure allows AI models to break content into context-appropriate sections without losing meaning. Clean headings, logical section flow, consistent naming and proper schema help answer engines determine what each part of a page means, how it relates to the broader topic and whether it can be safely extracted and cited as a source.</p>
        <h3 style="font-size:18px;margin:16px 0 8px">Who should use AiVIS</h3>
        <p style="color:#94a3b8;line-height:1.6">AiVIS is built for solofounders, marketers, developers and power users who need to understand why their content is not being used by AI answer engines. If your site depends on being found, trusted and reused by ChatGPT, Perplexity, Claude or Google AI, the audit shows exactly where visibility breaks and what changes will fix it.</p>
