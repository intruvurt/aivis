    <!-- FAQPage — machine-readable Q&A for AI answer engines; no visual output -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is AI visibility and why does it matter?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AI visibility is the degree to which an AI system; such as ChatGPT, Perplexity, Claude or Google AI Overviews; can parse, trust and cite your website content in generated answers. A page that scores poorly for AI visibility is unlikely to appear as a source or citation in AI generated responses, regardless of its traditional search ranking. AI visibility depends on structured data quality, heading clarity, content depth, metadata completeness and machine readable formatting."
            }
          },
          {
            "@type": "Question",
            "name": "What are the two types of AI visibility?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The first type is structural readiness; whether AI can parse your schema, headings, content depth and metadata well enough to extract trustworthy information. The second type is brand presence; whether your business actually appears when AI systems answer questions in your industry. AiVIS measures both: the audit pipeline handles structural readiness with a 0–100 score across six weighted categories, while citation testing, brand mention scanning across nine public sources and competitor tracking handle brand presence monitoring."
            }
          },
          {
            "@type": "Question",
            "name": "How does AiVIS calculate a visibility score?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AiVIS runs a multi-stage audit pipeline: it crawls the target URL with a real browser, extracts structural signals (headings, schema, meta tags, body content, links), runs technical checks, then passes the evidence to a primary AI model for scoring. On Signal and Score Fix tiers, a second AI model peer-critiques the findings and a third validates the final result. Score Fix also generates automated GitHub PRs via MCP at 10-25 credits per fix. The 0–100 visibility score is a weighted composite across six categories: Content Depth and Quality (20%), Schema and Structured Data (20%), AI Readability and Citability (20%), Technical SEO (15%), Meta Tags and Open Graph (13%), and Heading Structure and H1 (12%). Each finding is tied back to real page evidence."
            }
          },
          {
            "@type": "Question",
            "name": "What is the difference between AiVIS and traditional SEO tools?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Traditional SEO tools optimize for search engine crawlers and ranking signals like backlinks or keyword density. AiVIS focuses specifically on answer engine readiness; whether AI systems can extract, trust and cite your content in generated responses. AiVIS evaluates machine readability, entity clarity, schema coverage and citability rather than link authority. Every recommendation is evidence-linked, meaning it references the specific crawled signal that triggered it, not a generic checklist. The platform also tracks brand presence across citation sources and discussion platforms, which traditional SEO tools do not measure."
            }
          },
          {
            "@type": "Question",
            "name": "How does citation testing work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AiVIS runs live citation checks across three free web search engines; DuckDuckGo HTML, Bing HTML and DDG Instant Answer; all in parallel. On Signal tier and above, you can create AI generated query packs, schedule recurring tests and track your niche ranking position over time. The citation evidence view shows exactly which sources mention your brand and how results change between test runs. No paid search APIs are required."
            }
          },
          {
            "@type": "Question",
            "name": "What sources does brand mention tracking monitor?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Brand mention tracking scans nine free public sources: Reddit, Hacker News, Mastodon, DuckDuckGo site specific search, Bing site specific search, Google News RSS, GitHub repositories, Quora and Product Hunt. Available on the Alignment tier and above."
            }
          },
          {
            "@type": "Question",
            "name": "Which AI platforms does AiVIS measure visibility for?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AiVIS audits readiness across the major answer engines: ChatGPT (OpenAI), Perplexity AI, Claude (Anthropic) and Google AI Overviews. The audit report includes per platform visibility scores and highlights which structural gaps are most likely to prevent citation in each platform's answer format. The scoring model accounts for how each platform weights structured content, entity disambiguation and topical authority."
            }
          },
          {
            "@type": "Question",
            "name": "What integrations are available?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AiVIS includes a REST API with OpenAPI 3.0 documentation, full OAuth 2.0 authorization code flow, MCP Server with 14 tool endpoints for AI coding agents, WebMCP for browser based AI integration, HMAC signed webhooks, deploy hooks that trigger rescans after deployment, Google Search Console integration and IndexNow URL submission. All integrations are available on the Alignment tier and above."
            }
          },
          {
            "@type": "Question",
            "name": "What plans does AiVIS offer and what is included?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "AiVIS offers four tiers. Observer (free) includes 10 scans per month powered by open-weight AI models. Alignment (Core, $49/month) includes 60 scans per month with GPT-4o Mini as the primary model, competitor tracking, brand mention scanning, reverse engineering tools, and full API/webhook/MCP access. Signal (Premium, $149/month) includes 110 scans per month with a triple-check pipeline, citation testing, niche ranking, scheduled citation tests, and white-label reports. Score Fix AutoPR ($299 per 250-credit pack) uses GPT-4o+ in the primary slot and generates automated GitHub PRs via MCP at 10-25 credits per fix — not a subscription, users repurchase when credits are exhausted."
            }
          }
        ]
