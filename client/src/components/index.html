    <!-- Boot + Motion Loading Layer -->
    <style>
      #boot-screen {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 30%, #0b1220, #020617);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }

      .boot-core {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        font-family: ui-sans-serif;
        color: #7dd3fc;
        letter-spacing: 0.08em;
        text-transform: lowercase;
      }

      .orb {
        width: 64px;
        height: 64px;
        border-radius: 999px;
        background: radial-gradient(circle, #22d3ee, transparent 70%);
        animation: pulse 1.2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      .boot-bar {
        width: 240px;
        height: 2px;
        background: rgba(148, 163, 184, 0.2);
        overflow: hidden;
        border-radius: 999px;
      }

      .boot-fill {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #22d3ee, #f97316);
        animation: load 1.3s infinite ease-in-out;
      }

      @keyframes load {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      #root {
        opacity: 0;
        transition: opacity 0.6s ease;
      }

      .boot-text {
        font-size: 14px;
        opacity: 0.75;
      }
    </style>
  </head>

  <body>
    <!-- BOOT SCREEN -->
    <div id="boot-screen">
      <div class="boot-core">
        <div class="orb"></div>
        <div class="boot-text">initializing ai visibility engine...</div>
        <div class="boot-bar">
          <div class="boot-fill"></div>
        </div>
      </div>
    </div>

    <!-- APP ROOT -->
    <div id="root"></div>

    <script>
      window.addEventListener('load', () => {
        const boot = document.getElementById('boot-screen');
        const root = document.getElementById('root');

        setTimeout(() => {
          if (root) root.style.opacity = '1';
          if (boot) boot.style.opacity = '0';

          setTimeout(() => {
            if (boot) boot.remove();
          }, 600);
        }, 250);
      });
    </script>

    <!-- YOUR APP -->

  </body>
