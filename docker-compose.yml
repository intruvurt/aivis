version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: supabase-credentials-database_url
      POSTGRES_PASSWORD: supabase-credentials-database_url
      POSTGRES_DB: supabase-credentials-database_url
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-node:
    build: ./apps/api-node
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  python-intel:
    build: ./services/python-intel
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
