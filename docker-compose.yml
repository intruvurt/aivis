version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: supabase-credentials-database_url
      POSTGRES_PASSWORD: supabase-credentials-database_url
      POSTGRES_DB: supabase-credentials-database_url
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-node:
    build: ./apps/api-node
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  python-intel:
    build: ./services/python-intel
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

        scan-worker:
    build: ./workers/scan-worker
    depends_on: [redis]
    command: node index.js

  entity-worker:
    build: ./workers/entity-worker
    depends_on: [redis, python-intel]
    command: node index.js

  gap-worker:
    build: ./workers/gap-worker
    depends_on: [redis, python-intel]
    command: node index.js

  page-worker:
    build: ./workers/page-worker
    depends_on: [redis]
    command: node index.js

  publish-worker:
    build: ./workers/publish-worker
    depends_on: [redis]
    command: node index.js

  feedback-worker:
    build: ./workers/feedback-worker
    depends_on: [redis]
    command: node index.js
