version: "3.9"

networks:
  aivis_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:

services:
  # ---------------- FRONTEND ----------------
  frontend:
    build: ./apps/web
    container_name: aivis_frontend
    restart: unless-stopped
    networks:
      - aivis_net
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------- API ----------------
  api-node:
    build: ./apps/api-node
    container_name: aivis_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - aivis_net
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/aivis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------- NGINX GATEWAY ----------------
  nginx:
    image: nginx:alpine
    container_name: aivis_nginx
    restart: unless-stopped
    networks:
      - aivis_net
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api-node

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:15-alpine
    container_name: aivis_postgres
    restart: unless-stopped
    networks:
      - aivis_net
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P7SVno9AGvMG5equ
      POSTGRES_DB: postgres
    ports:
      - "6543:6543"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------- REDIS ----------------
  redis:
    image: redis:7-alpine
    container_name: aivis_redis
    restart: unless-stopped
    networks:
      - aivis_net
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------- PYTHON INTEL SERVICE ----------------
  python-intel:
    build: ./services/python-intel
    container_name: aivis_python_intel
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    networks:
      - aivis_net
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://default:EVKlKT5bVAm6pO107bHau2q5sF0jVzef@redis-15672.c11.us-east-1-2.ec2.cloud.redislabs.com:15672

  # ---------------- WORKERS (ISOLATED) ----------------

  scan-worker:
    build: ./workers/scan-worker
    container_name: scan_worker
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - aivis_net
    command: node index.js

  entity-worker:
    build: ./workers/entity-worker
    container_name: entity_worker
    restart: unless-stopped
    depends_on:
      - redis
      - python-intel
    networks:
      - aivis_net
    command: node index.js

  gap-worker:
    build: ./workers/gap-worker
    container_name: gap_worker
    restart: unless-stopped
    depends_on:
      - redis
      - python-intel
    networks:
      - aivis_net
    command: node index.js

  page-worker:
    build: ./workers/page-worker
    container_name: page_worker
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - aivis_net
    command: node index.js

  publish-worker:
    build: ./workers/publish-worker
    container_name: publish_worker
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - aivis_net
    command: node index.js

  feedback-worker:
    build: ./workers/feedback-worker
    container_name: feedback_worker
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - aivis_net
    command: node index.js
