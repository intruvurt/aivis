server {
  listen 80;
  server_name aivis.biz www.aivis.biz;

  # -------------------------
  # FRONTEND (React / Next)
  # -------------------------
  location / {
    proxy_pass http://frontend:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # -------------------------
  # BACKEND API (NO CORS EVER)
  # -------------------------
  location /api/ {
    proxy_pass http://node_api:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # IMPORTANT: keeps long SSE / streaming alive
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }

  # -------------------------
  # ERROR NORMALIZATION
  # -------------------------
  error_page 502 503 504 = @error_json;

  location @error_json {
    internal;
    add_header Content-Type application/json;
    return 502 '{"error":"backend_unavailable"}';
  }
}
