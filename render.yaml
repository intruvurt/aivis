services:
  # ─── Backend API (Express) ─────────────────────────────────────────────────
  - type: web
    name: aivis
    runtime: node
    plan: starter
    region: ohio
    buildCommand: cd server && npm install --include=dev && npm run build && npx puppeteer browsers install chrome
    startCommand: cd server && node --import ./dist/server/src/instrument.js dist/server/src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      # REQUIRED: Set to your deployed frontend URL (e.g. https://aivis.biz)
      # Used for CORS — server exits(1) in production without this.
      - key: FRONTEND_URL
        sync: false
      # ── Crypto Intelligence (blockchain scanning) ──────────────────────────
      # Set these in the Render dashboard — never hardcode secrets in this file.
      - key: INFURA_API_KEY
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: SOLANA_RPC_URL
        value: https://mainnet.helius-rpc.com
      # All other env vars (DATABASE_URL, JWT_SECRET, STRIPE_*, etc.)
      # should be set in the Render dashboard under Environment → Secret Files / Env Groups.

  # ─── Frontend (Vite static site) ──────────────────────────────────────────
  - type: web
    name: aivis-web
    runtime: static
    buildCommand: cd client && npm install --include=dev && npm run build
    staticPublishPath: client/dist
    envVars:
      # REQUIRED: Set to your deployed backend URL (e.g. https://api.aivis.biz)
      - key: VITE_API_URL
        sync: false
    headers:
      # ── Immutable hashed assets ──
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # ── Security headers (mirrors Express securityMiddleware) ──
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains; preload
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google.com https://www.gstatic.com;
          style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
          img-src 'self' data: https:;
          font-src 'self' https://fonts.gstatic.com;
          connect-src 'self' https://api.aivis.biz https://www.google-analytics.com https://www.googletagmanager.com;
          frame-src 'self' https://www.google.com https://js.stripe.com;
          object-src 'none';
          base-uri 'self';
          form-action 'self';
          upgrade-insecure-requests
    routes:
      # SPA fallback — all non-asset routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
